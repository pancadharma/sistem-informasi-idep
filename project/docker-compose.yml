version: '3.8'

services:
  # 1. PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idep_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html      # <--- THIS IS THE MAGIC
    networks:
      - idep_net
    depends_on:
      - db

  # 2. Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: idep_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html      # Nginx also needs to see your files
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - idep_net
    depends_on:
      - app

  # 3. Database (MariaDB 10.5)
  db:
    image: mariadb:10.5
    container_name: idep_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel_password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - idep_net

  # 4. PHPMyAdmin (Optional helper)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: idep_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - idep_net

volumes:
  db_data:

networks:
  idep_net:
    driver: bridge