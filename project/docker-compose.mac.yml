version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.mac
    container_name: idep_app_mac
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      PHP_MEMORY_LIMIT: 512M
    depends_on:
      - db
    networks:
      - idep_net
    command: >
      sh -c " if [ ! -f .env ]; then
        cp .env.example .env &&
        php artisan key:generate;
      fi && composer install && php-fpm "

  web:
    image: nginx:alpine
    container_name: idep_nginx_mac
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:cached
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - idep_net

  node:
    image: node:20-alpine
    container_name: idep_node_mac
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - idep_net

  db:
    image: mysql:8.0
    container_name: idep_db_mac
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel_password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - idep_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: idep_pma_mac
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - idep_net

volumes:
  db_data:
  vendor:
  node_modules:


networks:
  idep_net:
    driver: bridge
